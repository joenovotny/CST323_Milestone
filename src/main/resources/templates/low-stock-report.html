<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Low Stock Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Low Stock Report</h2>
    <a href="/dashboard" class="btn btn-secondary mb-3">Back</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Product</th>
            <th>Description</th>
            <th>Location</th>
            <th>Quantity</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="inv : ${inventoryList}">
            <td th:text="${inv.product.name}"></td>
            <td th:text="${inv.product.description}"></td>
            <td th:text="${inv.product.location}"></td>
            <td th:text="${inv.quantity}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
