<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Create Order</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/orders/save}" th:object="${orderForm}" method="post">
        <div class="mb-3">
            <label class="form-label">Customer</label>
            <select th:field="*{customerId}" class="form-select" required>
                <option value="">Select Customer</option>
                <option th:each="customer : ${customers}"
                        th:value="${customer.id}"
                        th:text="${customer.firstName + ' ' + customer.lastName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Product</label>
            <select th:field="*{productId}" class="form-select" required>
                <option value="">Select Product</option>
                <option th:each="product : ${products}"
                        th:value="${product.id}"
                        th:text="${product.name + ' - $' + product.price}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control" min="1" required>
        </div>

        <button type="submit" class="btn btn-success">Save Order</button>
        <a href="/orders" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
