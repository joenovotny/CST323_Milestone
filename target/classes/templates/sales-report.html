<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detailed Sales Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Detailed Sales Report</h2>
    <a href="/dashboard" class="btn btn-secondary mb-3">Back</a>

    <form method="get" action="/reports/sales" class="row g-3 mb-4">
        <div class="col-md-4">
            <label class="form-label">Start Date</label>
            <input type="date" name="startDate" class="form-control" th:value="${startDate}">
        </div>
        <div class="col-md-4">
            <label class="form-label">End Date</label>
            <input type="date" name="endDate" class="form-control" th:value="${endDate}">
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Run Report</button>
        </div>
    </form>

    <table class="table table-bordered table-striped" th:if="${salesItems != null}">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Unit Price</th>
            <th>Line Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${salesItems}">
            <td th:text="${item.orderHeader.id}"></td>
            <td th:text="${item.orderHeader.orderDate}"></td>
            <td th:text="${item.orderHeader.customer.firstName + ' ' + item.orderHeader.customer.lastName}"></td>
            <td th:text="${item.product.name}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.unitPrice}"></td>
            <td th:text="${item.lineTotal}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
