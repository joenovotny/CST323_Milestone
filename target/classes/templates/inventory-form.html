<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Inventory Form</h2>

    <form th:action="@{/inventory/save}" th:object="${inventory}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Product</label>
            <select name="productId" class="form-select" required>
                <option value="">Select Product</option>
                <option th:each="product : ${products}"
                        th:value="${product.id}"
                        th:text="${product.name}">
                </option>
            </select>
        </div>
<div th:if="${duplicateError}" class="alert alert-danger" th:text="${duplicateError}"></div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control" min="0">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('quantity')}"
                 th:errors="*{quantity}"></div>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/inventory" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
